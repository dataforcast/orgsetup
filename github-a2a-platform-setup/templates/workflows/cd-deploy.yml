# ============================================================================
# cd-deploy.yml — Pipeline CD pour le déploiement des agents A2A
# Étapes : scan image → push registry → update K8s manifests → deploy
# Limité aux branches develop, staging, main
# ============================================================================
name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [develop, staging, main]

permissions:
  contents: read
  packages: write

env:
  DOCKER_REGISTRY: ghcr.io
  K8S_NAMESPACE_PREFIX: a2a

jobs:
  # ── Garde-fou : ne déployer que si la CI a réussi ──
  check-ci:
    name: Verify CI Success
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed, proceeding with CD"

  image-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    needs: check-ci
    steps:
      - name: Download image from CI
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  push-registry:
    name: Push to Container Registry
    runs-on: ubuntu-latest
    needs: image-scan
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image from CI
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push image
        run: |
          docker load -i /tmp/image.tar

          BRANCH="${{ github.event.workflow_run.head_branch }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          IMAGE_BASE="${{ env.DOCKER_REGISTRY }}/${{ github.repository }}"

          # Tag selon la branche
          docker tag "${IMAGE_BASE}:${SHA}" "${IMAGE_BASE}:${SHORT_SHA}"
          docker tag "${IMAGE_BASE}:${SHA}" "${IMAGE_BASE}:${BRANCH}"

          if [[ "$BRANCH" == "main" ]]; then
            docker tag "${IMAGE_BASE}:${SHA}" "${IMAGE_BASE}:latest"
          fi

          docker push "${IMAGE_BASE}" --all-tags

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: push-registry
    strategy:
      matrix:
        include:
          - branch: develop
            env_name: dev
          - branch: staging
            env_name: staging
          - branch: main
            env_name: production
    if: ${{ github.event.workflow_run.head_branch == matrix.branch }}
    environment:
      name: ${{ matrix.env_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO_NAME="${{ github.event.repository.name }}"
          echo "image_tag=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "namespace=${{ env.K8S_NAMESPACE_PREFIX }}-${{ matrix.env_name }}" >> "$GITHUB_OUTPUT"
          echo "app_name=${REPO_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Update K8s manifests
        run: |
          IMAGE="${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:${{ steps.vars.outputs.image_tag }}"
          NAMESPACE="${{ steps.vars.outputs.namespace }}"
          APP="${{ steps.vars.outputs.app_name }}"

          # Appliquer le namespace s'il n'existe pas
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

          # Mise à jour de l'image dans le déploiement
          if kubectl get deployment "${APP}" -n "${NAMESPACE}" >/dev/null 2>&1; then
            kubectl set image deployment/"${APP}" \
              "${APP}=${IMAGE}" \
              -n "${NAMESPACE}"
            kubectl rollout status deployment/"${APP}" \
              -n "${NAMESPACE}" \
              --timeout=300s
          else
            echo "⚠ Deployment ${APP} not found in ${NAMESPACE}."
            echo "  Apply Helm charts or K8s manifests first."
            echo "  Skipping kubectl set image."
          fi

      - name: Verify deployment
        run: |
          NAMESPACE="${{ steps.vars.outputs.namespace }}"
          APP="${{ steps.vars.outputs.app_name }}"
          kubectl get pods -n "${NAMESPACE}" -l app="${APP}" -o wide || true
