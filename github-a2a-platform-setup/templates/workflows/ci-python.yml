# ============================================================================
# ci-python.yml — Pipeline CI pour les agents Python A2A
# Étapes : lint/format → tests unitaires → SAST + dépendances + secrets → build Docker
# ============================================================================
name: CI Pipeline

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  DOCKER_REGISTRY: ghcr.io

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type checking
        run: mypy . --ignore-missing-imports || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt 2>/dev/null || pip install -r requirements.txt || true
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  security-sast:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # -- SAST avec Bandit --
      - name: Bandit SAST
        run: |
          pip install bandit[toml]
          bandit -r src/ -f json -o bandit-report.json --severity-level medium || true
          bandit -r src/ --severity-level medium

      # -- Analyse des dépendances avec pip-audit --
      - name: Dependency audit
        run: |
          pip install pip-audit
          pip install -r requirements.txt 2>/dev/null || true
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit

      # -- Détection de secrets avec Gitleaks --
      - name: Secret detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, security-sast]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Save Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1
